<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <!-- Radar rings -->
  <circle cx="30" cy="30" r="24" stroke="#00ff88" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="30" cy="30" r="16" stroke="#00ff88" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="30" cy="30" r="8" stroke="#00ff88" stroke-width="1" stroke-opacity="0.7"/>

  <!-- Crosshair lines -->
  <line x1="30" y1="4" x2="30" y2="56" stroke="#00ff88" stroke-width="0.75" stroke-opacity="0.3"/>
  <line x1="4" y1="30" x2="56" y2="30" stroke="#00ff88" stroke-width="0.75" stroke-opacity="0.3"/>

  <!-- Radar sweep -->
  <path d="M30 30 L54 18 A24 24 0 0 1 54 42 Z" fill="#00ff88" fill-opacity="0.08"/>
  <line x1="30" y1="30" x2="54" y2="18" stroke="#00ff88" stroke-width="1.5" stroke-opacity="0.9"/>

  <!-- Center dot -->
  <circle cx="30" cy="30" r="3" fill="#00ff88"/>

  <!-- Blip dot -->
  <circle cx="44" cy="20" r="2.5" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Text: ARBITRAX -->
  <text x="66" y="28" font-family="'Courier New', monospace" font-size="18" font-weight="700" letter-spacing="2" fill="#ffffff">ARBITRAX</text>

  <!-- Text: AI -->
  <text x="66" y="48" font-family="'Courier New', monospace" font-size="13" font-weight="700" letter-spacing="6" fill="#00ff88">AI</text>

  <!-- Decorative line -->
  <line x1="66" y1="33" x2="210" y2="33" stroke="#00ff88" stroke-width="0.5" stroke-opacity="0.3"/>
</svg>
